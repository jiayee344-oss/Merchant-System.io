<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Merchant System | 智能商家查询</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="lang-fixed">
    <button id="langToggle" aria-label="Switch Language">EN</button>
</div>

<div class="container">
    <div class="hero">
        <h1 id="title"> 商家查询</h1>
        <p id="subtitle">快速查询商家 CALL 状态 / 访谈安排</p>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入完整商家名字" autocomplete="off">
            <button onclick="searchData()" id="searchBtn">搜索</button>
        </div>
        <div class="mode-switch">
            <button class="mode active" data-mode="call" id="modeCallBtn">是否 CALL 过</button>
            <button class="mode" data-mode="interview" id="modeInterviewBtn">访谈时间</button>
        </div>
    </div>
    <div id="result" class="result-grid"></div>
    <div class="footer-note">✨ 全表扫描状态</div>
</div>

<script src="script.js"></script>
</body>
</html>
