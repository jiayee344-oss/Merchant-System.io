<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>商家CALL状态查询</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="lang-fixed">
    <button id="langToggle" aria-label="Switch Language">EN</button>
</div>

<div class="container">
    <div class="logo-area">
        <img src="logo.png" alt="Logo" class="site-logo">
    </div>

    <div class="hero">
        <h1 id="title">📞 商家CALL状态查询</h1>
        <p id="subtitle">自动扫描所有工作表 · 点击商家查看详情</p>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入关键字" autocomplete="off">
            <button onclick="searchData()" id="searchBtn">🔍 搜索</button>
            <button id="interviewBtn">📅 访谈时间</button>
        </div>
    </div>
    <div id="result" class="result-grid"></div>
    <div class="footer-note">✨ 数据实时同步 Google Sheets</div>
</div>

<!-- 详情模态框 -->
<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<!-- 访谈时间模态框 -->
<div id="interviewModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="closeInterviewBtn">&times;</span>
        <div id="interviewModalBody" style="padding: 20px 24px 30px;"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
